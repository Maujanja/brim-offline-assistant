name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools for APK validation
        run: sdkmanager "build-tools;35.0.0"

      - name: Restore CI signing keystore
        id: signing-cache
        uses: actions/cache@v4
        with:
          path: android/ci-release.jks
          key: brim-voice-assistant-ci-keystore-v1

      - name: Download Vosk English speech model
        working-directory: android
        run: |
          set -euxo pipefail
          MODEL_URL="https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip"
          DEST="app/src/main/assets/model-en"
          if [ -f "$DEST/README" ] || [ -d "$DEST/am" ]; then
            echo "Model already present, skipping download."
          else
            mkdir -p app/src/main/assets
            curl -L --fail -o /tmp/vosk-en.zip "$MODEL_URL"
            unzip -q /tmp/vosk-en.zip -d app/src/main/assets/
            rm -rf "$DEST"
            mv app/src/main/assets/vosk-model-small-en-us-0.15 "$DEST"
            # Vosk on Android reads uncompressed assets; keep them raw.
            du -sh "$DEST"
          fi

      - name: Prepare CI signing keystore
        working-directory: android
        run: |
          set -euxo pipefail
          if [ ! -f ci-release.jks ]; then
            keytool -genkeypair -v \
              -keystore ci-release.jks \
              -alias brim \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass brimbrim -keypass brimbrim \
              -dname "CN=Brim, OU=Dev, O=Brimedge, L=Dar, S=DSM, C=TZ"
          fi
          keytool -list -keystore ci-release.jks -storepass brimbrim -alias brim

      - name: Build installable APK
        working-directory: android
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/android/ci-release.jks
          RELEASE_KEYSTORE_PASSWORD: brimbrim
          RELEASE_KEY_ALIAS: brim
          RELEASE_KEY_PASSWORD: brimbrim
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Collect and verify APK
        working-directory: android
        run: |
          set -euxo pipefail
          mkdir -p out
          cp app/build/outputs/apk/release/app-release.apk out/Brim-Voice-Assistant.apk
          cat > out/README-INSTALL.txt <<'EOF'
          INSTALLATION:
          1. If you downloaded from GitHub Actions, extract the ZIP first.
          2. Install the file named Brim-Voice-Assistant.apk inside it.
          3. If Android says "App not installed", uninstall any old Brim Voice Assistant copy from all phone profiles, then install again.

          EASIEST OPTION:
          Open the GitHub Releases page and download Brim-Voice-Assistant.apk directly.
          EOF
          APKSIGNER="$(find "$ANDROID_HOME/build-tools" -name apksigner -type f | sort -V | tail -n 1)"
          ZIPALIGN="$(find "$ANDROID_HOME/build-tools" -name zipalign -type f | sort -V | tail -n 1)"
          AAPT="$(find "$ANDROID_HOME/build-tools" -name aapt -type f | sort -V | tail -n 1)"
          if [ -z "$APKSIGNER" ]; then
            echo "apksigner not found in Android SDK build-tools"
            exit 1
          fi
          if [ -z "$ZIPALIGN" ]; then
            echo "zipalign not found in Android SDK build-tools"
            exit 1
          fi
          if [ -z "$AAPT" ]; then
            echo "aapt not found in Android SDK build-tools"
            exit 1
          fi
          for apk in out/*.apk; do
            "$AAPT" dump badging "$apk" | tee "$apk.badging.txt"
            "$ZIPALIGN" -c -P 16 -v 4 "$apk" | tee "$apk.zipalign.txt"
            "$APKSIGNER" verify --min-sdk-version 21 --verbose --print-certs "$apk"
            sha256sum "$apk" > "$apk.sha256"
          done

          WORKDIR="$(mktemp -d)"
          unzip -q out/Brim-Voice-Assistant.apk -d "$WORKDIR/apk"
          bad_alignment=0
          while IFS= read -r so; do
            abi="$(basename "$(dirname "$so")")"
            case "$abi" in
              arm64-v8a)
                if readelf -l "$so" | awk '/LOAD/ { getline; if ($NF != "0x4000" && $NF != "0x10000") bad=1 } END { exit bad }'; then
                  echo "16KB ELF alignment OK: $so"
                else
                  echo "ERROR: $so is not 16KB ELF-aligned for Android 15+ devices"
                  bad_alignment=1
                fi
                ;;
              *)
                echo "ELF alignment check skipped for 32-bit ABI: $so"
                ;;
            esac
          done < <(find "$WORKDIR/apk/lib" -name '*.so' -type f | sort)
          rm -rf "$WORKDIR"
          if [ "$bad_alignment" -ne 0 ]; then
            exit 1
          fi
          ls -lh out/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Brim-Voice-Assistant-installable-apk
          path: |
            android/out/Brim-Voice-Assistant.apk
            android/out/Brim-Voice-Assistant.apk.sha256
            android/out/Brim-Voice-Assistant.apk.badging.txt
            android/out/Brim-Voice-Assistant.apk.zipalign.txt
            android/out/README-INSTALL.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Brim Voice Assistant build ${{ github.run_number }}
          make_latest: true
          files: |
            android/out/Brim-Voice-Assistant.apk
            android/out/Brim-Voice-Assistant.apk.sha256
            android/out/Brim-Voice-Assistant.apk.badging.txt
            android/out/Brim-Voice-Assistant.apk.zipalign.txt
            android/out/README-INSTALL.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
