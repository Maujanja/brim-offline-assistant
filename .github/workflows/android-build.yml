name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore CI signing keystore
        id: signing-cache
        uses: actions/cache@v4
        with:
          path: android/ci-release.jks
          key: brim-voice-assistant-ci-keystore-v1

      - name: Generate Gradle wrapper
        working-directory: android
        run: gradle wrapper --gradle-version 8.7

      - name: Download Vosk English speech model
        working-directory: android
        run: |
          set -euxo pipefail
          MODEL_URL="https://alphacephei.com/vosk/models/vosk-model-small-en-us-0.15.zip"
          DEST="app/src/main/assets/model-en"
          if [ -f "$DEST/README" ] || [ -d "$DEST/am" ]; then
            echo "Model already present, skipping download."
          else
            mkdir -p app/src/main/assets
            curl -L --fail -o /tmp/vosk-en.zip "$MODEL_URL"
            unzip -q /tmp/vosk-en.zip -d app/src/main/assets/
            rm -rf "$DEST"
            mv app/src/main/assets/vosk-model-small-en-us-0.15 "$DEST"
            # Vosk on Android reads uncompressed assets; keep them raw.
            du -sh "$DEST"
          fi

      - name: Prepare CI signing keystore
        working-directory: android
        run: |
          set -euxo pipefail
          if [ ! -f ci-release.jks ]; then
            keytool -genkeypair -v \
              -keystore ci-release.jks \
              -alias brim \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass brimbrim -keypass brimbrim \
              -dname "CN=Brim, OU=Dev, O=Brimedge, L=Dar, S=DSM, C=TZ"
          fi
          keytool -list -keystore ci-release.jks -storepass brimbrim -alias brim

      - name: Build Debug APK
        working-directory: android
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/android/ci-release.jks
          RELEASE_KEYSTORE_PASSWORD: brimbrim
          RELEASE_KEY_ALIAS: brim
          RELEASE_KEY_PASSWORD: brimbrim
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Build Release APK
        working-directory: android
        env:
          RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/android/ci-release.jks
          RELEASE_KEYSTORE_PASSWORD: brimbrim
          RELEASE_KEY_ALIAS: brim
          RELEASE_KEY_PASSWORD: brimbrim
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Collect APKs
        working-directory: android
        run: |
          set -euxo pipefail
          mkdir -p out
          cp app/build/outputs/apk/debug/app-debug.apk out/Brim-Voice-Assistant-debug.apk
          cp app/build/outputs/apk/release/app-release.apk out/Brim-Voice-Assistant-release.apk
          for apk in out/*.apk; do
            apksigner verify --verbose --print-certs "$apk"
          done
          ls -lh out/

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brim-voice-assistant-apks
          path: android/out/*.apk

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Brim Voice Assistant build ${{ github.run_number }}
          files: android/out/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
